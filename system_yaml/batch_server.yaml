apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch
spec:
  selector:
    matchLabels:
      app: batch
  template:
    metadata:
      labels:
        app: batch
        user: batch
    spec:
      containers:
      - name: batch
        image: sciencedata/batch_server
        env:
        - name: USERNAME
          value: 'root'
        - name: SD_UID
          value: 'batch'
        - name: HOME_SERVER
          value: '10.2.0.13'
        - name: PUBLIC_HOME_SERVER
          value: 'sciencedata.dk'
        - name: ONLY_FROM
          value: "10.2.12.1"
        - name: SSL_DN_HEADER
          value: "SSL-Client-DN"
        - name: TRUSTED_VOS
          value: "https://batch/vos/default.txt"
        - name: MY_VOS
          value: "https://sciencedata.dk/sites/batch/vos/anyone.txt"
        - name: RTE_URLS
          value: "https://sciencedata.dk/sites/batch/rtes/rtes.xml"
        - name: MY_HOSTNAME
          value: "batch"
        - name: ADMIN_SUBJECT
          value: "O=sciencedata.dk,CN=batch"
        ports:
        - name: http
          containerPort: 80
        - name: https
          containerPort: 443
      #nodeName: peon152
---
apiVersion: v1
kind: Service
metadata:
  name: batch
spec:
  type: NodePort
  selector:
    app: batch
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
    - name: https
      protocol: TCP
      port: 443
      targetPort: 443