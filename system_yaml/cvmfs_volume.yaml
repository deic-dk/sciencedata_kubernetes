apiVersion: v1
kind: PersistentVolume
metadata:
  name: local--cvmfs # will be configured by run_pod
  labels:
    type: local
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual
  hostPath:
    path: /cvmfs # will be configured by run_pod
